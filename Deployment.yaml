apiVersion: apps/v1
kind: Deployment
metadata:
  name: exam-web
  namespace: exam-k8s
  labels:
    app: exam-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exam-web
  template:
    metadata:
      labels:
        app: exam-web
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
          protocol: TCP
        volumeMounts:
        - name: html-content
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: html-content
        configMap:
          name: exam-config
